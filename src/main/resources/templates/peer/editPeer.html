<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Add New Peer</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="parent">
    <div class="block">
        <h3>Edit Peer</h3>

        <form th:action="@{/peers/edit/{nickname}(nickname=${editPeerDto.nickname})}" th:method="post" th:object="${editPeerDto}">

            <div th:if="${#fields.hasAnyErrors()}" >
                    <span class="validationError">
                        Please correct the problems below and resubmit.
                    </span>
            </div>

            <div>
                <label for="nickname">Name</label>
                <input type="text" th:field="*{nickname}" id="nickname" placeholder="Nickname" readonly>
                <span class="validationError" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}">Name Error</span>
                <br>
                <label for="birthday">Birthday</label>
                <input type="date" th:field="*{birthday}" id="birthday" placeholder="YYYY-MM-DD">
                <span class="validationError" th:if="${#fields.hasErrors('birthday')}">Birthday is required</span>
                <br>
                <input type="submit" value="Edit Peer">
            </div>

        </form>

        <div>
            <a href="/peers">Back to list of Peers</a>
        </div>

    </div>
</div>

</body>
</html>
